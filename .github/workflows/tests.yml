name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x64
            os: ubuntu-latest
            python-version: "3.8"
          - name: Ubuntu x64
            os: ubuntu-latest
            python-version: "3.14"
          - name: Windows x64
            os: windows-latest
            python-version: "3.8"
          - name: Windows x64
            os: windows-latest
            python-version: "3.14"
          - name: macOS Intel
            os: macos-15-intel
            python-version: "3.8"
          - name: macOS Intel
            os: macos-15-intel
            python-version: "3.14"
          - name: macOS Apple Silicon
            os: macos-latest
            python-version: "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall -q main.py plexamp.py
